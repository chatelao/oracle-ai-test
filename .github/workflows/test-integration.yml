name: Integration Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  install-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache SQLcl
      uses: actions/cache@v4
      with:
        path: ~/sqlcl
        key: ${{ runner.os }}-sqlcl-latest

    - name: Cache Ollama Models
      uses: actions/cache@v4
      with:
        path: ./ollama_data
        key: ${{ runner.os }}-ollama-llama3

    - name: Cache Docker Images
      id: cache-docker-images
      uses: actions/cache@v4
      with:
        path: /tmp/docker-images
        key: ${{ runner.os }}-docker-images-${{ hashFiles('docker-compose.yml') }}

    - name: Load Docker Images
      run: |
        if [ -f /tmp/docker-images/images.tar ]; then
          docker load -i /tmp/docker-images/images.tar
        fi

    - name: Set up Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y jq curl unzip

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Check Scripts Syntax
      run: |
        bash -n test.sh
        bash -n install/llm.sh
        bash -n install/sqlcl.sh
        bash -n install/db_config.sh

    - name: Install SQLcl
      run: bash install/sqlcl.sh

    - name: Start Services (Database and Ollama)
      run: |
        docker compose up -d
        # We start Ollama via docker compose as defined in the project,
        # but the install/llm.sh might also be used for local setup.
        # For CI, we'll rely on docker compose for the service.

    - name: Wait for Oracle Database
      run: |
        echo "Waiting for Oracle Database to be healthy..."
        # The docker compose has a healthcheck, we can wait for it.
        MAX_RETRIES=60
        COUNT=0
        until [ "$(docker inspect --format='{{.State.Health.Status}}' oracle-db)" == "healthy" ]; do
            sleep 10
            COUNT=$((COUNT + 1))
            if [ $COUNT -ge $MAX_RETRIES ]; then
                echo "Error: Oracle Database failed to become healthy."
                docker logs oracle-db
                exit 1
            fi
            echo "Still waiting... ($((COUNT * 10))s)"
        done
        echo "Oracle Database container is healthy."

        echo "Ensuring SYSTEM account is unlocked and disabling failed login limit..."
        # This prevents the account from locking during the startup/polling phase.
        # We use sqlplus as the oracle user inside the container.
        docker exec -u oracle oracle-db bash -c "export ORACLE_SID=FREE; sqlplus -S / as sysdba <<EOF
ALTER USER system ACCOUNT UNLOCK;
ALTER PROFILE DEFAULT LIMIT FAILED_LOGIN_ATTEMPTS UNLIMITED;
EXIT;
EOF" || true

        echo "Waiting for Oracle Database to accept connections..."
        # Additional check to ensure the listener is ready and we can connect
        COUNT=0
        MAX_CONN_RETRIES=20
        # Increased sleep interval to 30s to reduce login attempts and allow DB to stabilize
        until CONNECTION_OUTPUT=$(echo "SELECT 1 FROM DUAL;" | sql -L -s system/password@127.0.0.1:1521/FREEPDB1 2>&1); do
            sleep 30
            COUNT=$((COUNT + 1))
            if [ $COUNT -ge $MAX_CONN_RETRIES ]; then
                echo "Error: Oracle Database failed to accept connections after 10 minutes."
                echo "Last connection error:"
                echo "$CONNECTION_OUTPUT"
                # If still locked, try to unlock again as a last resort
                docker exec -u oracle oracle-db bash -c "export ORACLE_SID=FREE; sqlplus -S / as sysdba <<EOF
ALTER USER system ACCOUNT UNLOCK;
EXIT;
EOF" || true
                exit 1
            fi
            echo "Still waiting for connection... ($((COUNT * 30))s)"
        done
        echo "Oracle Database is ready for connections."

    - name: Pull LLM Model
      run: |
        # Use the local ollama command to talk to the container
        # First install ollama cli if not present (install/llm.sh does this)
        # But we need it to point to the docker container if we run it from host
        # Actually, it's easier to just run it inside the container or via curl

        # Check if the model already exists to avoid redundant pull
        if ! docker exec ollama ollama list | grep -q "llama3"; then
          echo "llama3 model not found in cache. Pulling..."
          docker exec ollama ollama pull llama3
        else
          echo "llama3 model found in cache. Skipping pull."
        fi

    - name: Install SCOTT Schema
      env:
        DB_CONN_STR: "system/password@127.0.0.1:1521/FREEPDB1"
      run: |
        bash install/scott.sh

    - name: Run Test Script
      env:
        DB_CONN_STR: "system/password@127.0.0.1:1521/FREEPDB1"
      run: |
        # Ensure we can connect to the DB from the host
        # The docker compose maps 1521:1521
        bash test.sh

    - name: Save Docker Images
      if: steps.cache-docker-images.outputs.cache-hit != 'true'
      run: |
        mkdir -p /tmp/docker-images
        docker save container-registry.oracle.com/database/free:latest ollama/ollama:latest -o /tmp/docker-images/images.tar

    - name: Upload Test Report to Summary
      if: always()
      run: |
        if [ -f "test-report.md" ]; then
          cat test-report.md >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload Test Report as Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: test-report.md
